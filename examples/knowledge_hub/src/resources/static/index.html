<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Hub</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-muted: #eef2f5;
      --border: #d7dde4;
      --border-strong: #b7c1cc;
      --text: #16202a;
      --muted: #637083;
      --accent: #176b87;
      --accent-2: #2f7d32;
      --danger: #b42318;
      --shadow: 0 1px 2px rgba(20, 31, 43, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      min-height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #eef7f0;
      border-color: #b8d9bd;
      color: #1d5e25;
    }

    input, textarea, select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 8px 10px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .app {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      background: #17212b;
      color: #f8fafc;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
    }

    .brand span {
      color: #b8c4d0;
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      justify-content: flex-start;
      text-align: left;
      background: transparent;
      border-color: rgba(255,255,255,0.14);
      color: #dbe5ee;
    }

    .nav button.active {
      background: #243442;
      color: #fff;
    }

    main {
      padding: 24px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 18px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 26px;
    }

    .toolbar p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    .pager button {
      min-height: 30px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
    }

    .stat, .panel, .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 14px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.75fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .panel h3 {
      margin: 0;
      font-size: 17px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-grid .full {
      grid-column: 1 / -1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--surface-muted);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e7eef5;
      color: #2a4965;
    }

    .status.Published {
      background: #e8f4ea;
      color: #245d2b;
    }

    .status.Review {
      background: #fff4dd;
      color: #7a4a00;
    }

    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .message.error {
      color: var(--danger);
    }

    .article-body {
      white-space: pre-wrap;
      line-height: 1.5;
      color: #263442;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      background: #eef2f5;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      color: #334455;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .stats, .grid, .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>Knowledge Hub</h1>
        <span>NovaBoot + Postgres example</span>
      </div>
      <div class="nav">
        <button class="active" data-view="overview">Overview</button>
        <button data-view="project">New Project</button>
        <button data-view="contributor">New Contributor</button>
        <button data-view="article">New Article</button>
      </div>
    </aside>

    <main>
      <div class="toolbar">
        <div>
          <h2>Team knowledge base</h2>
          <p>Projects, contributors, articles, JSON metadata, and join tables backed by PostgreSQL.</p>
        </div>
        <div class="actions">
          <button id="refresh">Refresh</button>
          <button class="secondary" id="seed">Seed demo data</button>
        </div>
      </div>

      <section class="stats">
        <div class="stat"><span>Projects</span><strong id="stat-projects">0</strong></div>
        <div class="stat"><span>Articles</span><strong id="stat-articles">0</strong></div>
        <div class="stat"><span>Contributors</span><strong id="stat-contributors">0</strong></div>
        <div class="stat"><span>Published</span><strong id="stat-published">0</strong></div>
      </section>

      <section class="grid">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Article</th>
                <th>Project</th>
                <th>Status</th>
                <th>Contributors</th>
              </tr>
            </thead>
            <tbody id="articles"></tbody>
          </table>
          <div class="pager">
            <button id="prev-page">Previous</button>
            <span id="page-label">Page 1 of 1</span>
            <button id="next-page">Next</button>
          </div>
        </div>

        <div class="panel" id="side-panel"></div>
      </section>
    </main>
  </div>

  <script>
    const state = { dashboard: null, articlePage: null, articlePageNumber: 0, articlePageSize: 10, selectedArticle: null };
    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!response.ok) {
        const error = await response.json().catch(() => ({ message: response.statusText }));
        throw new Error(error.message || response.statusText);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    function setMessage(text, isError = false) {
      const node = document.querySelector(".message");
      if (!node) return;
      node.textContent = text || "";
      node.classList.toggle("error", isError);
    }

    function statusText(value) {
      return typeof value === "string" ? value : ["Draft", "Review", "Published"][value] || "Draft";
    }

    function renderStats(stats) {
      $("stat-projects").textContent = stats.projects;
      $("stat-articles").textContent = stats.articles;
      $("stat-contributors").textContent = stats.contributors;
      $("stat-published").textContent = stats.published;
    }

    function renderArticles(page) {
      const articles = page?.content || [];
      $("articles").innerHTML = articles.map((article) => `
        <tr>
          <td><button data-article="${article.id}">${article.title}</button></td>
          <td>${article.project_name}</td>
          <td><span class="status ${statusText(article.status)}">${statusText(article.status)}</span></td>
          <td>${article.contributor_count}</td>
        </tr>
      `).join("");
      document.querySelectorAll("[data-article]").forEach((button) => {
        button.addEventListener("click", () => loadArticle(button.dataset.article));
      });

      const totalPages = Math.max(page?.total_pages || 1, 1);
      $("page-label").textContent = `Page ${(page?.page || 0) + 1} of ${totalPages} · ${page?.total_elements || 0} articles`;
      $("prev-page").disabled = !page?.has_previous;
      $("next-page").disabled = !page?.has_next;
    }

    function renderOverview() {
      const dashboard = state.dashboard || { projects: [], contributors: [] };
      $("side-panel").innerHTML = `
        <h3>Projects</h3>
        <div class="message"></div>
        <table>
          <thead><tr><th>Name</th><th>Articles</th></tr></thead>
          <tbody>${dashboard.projects.map((project) => `
            <tr>
              <td>${project.name}<br><span style="color: var(--muted)">${project.slug}</span></td>
              <td>${project.article_count}</td>
            </tr>
          `).join("")}</tbody>
        </table>
        <h3>Contributors</h3>
        <div class="chips">
          ${dashboard.contributors.map((contributor) => `
            <span class="chip">${contributor.display_name} · ${contributor.role}</span>
          `).join("")}
        </div>
      `;
    }

    function renderProjectForm() {
      $("side-panel").innerHTML = `
        <h3>Create project</h3>
        <div class="message"></div>
        <form id="project-form" class="form-grid">
          <label>Slug<input name="slug" placeholder="platform"></label>
          <label>Name<input name="name" placeholder="Platform Playbook"></label>
          <label class="full">Description<textarea name="description"></textarea></label>
          <label>Public index
            <select name="public_index"><option value="true">true</option><option value="false">false</option></select>
          </label>
          <label>Review limit<input name="review_limit" type="number" min="1" value="2"></label>
          <button class="primary full" type="submit">Create project</button>
        </form>
      `;
      $("project-form").addEventListener("submit", submitProject);
    }

    function renderContributorForm() {
      $("side-panel").innerHTML = `
        <h3>Create contributor</h3>
        <div class="message"></div>
        <form id="contributor-form" class="form-grid">
          <label>Handle<input name="handle" placeholder="ada"></label>
          <label>Display name<input name="display_name" placeholder="Ada Lovelace"></label>
          <label class="full">Role<input name="role" placeholder="Editor"></label>
          <button class="primary full" type="submit">Create contributor</button>
        </form>
      `;
      $("contributor-form").addEventListener("submit", submitContributor);
    }

    function renderArticleForm() {
      const projects = state.dashboard?.projects || [];
      const contributors = state.dashboard?.contributors || [];
      $("side-panel").innerHTML = `
        <h3>Create article</h3>
        <div class="message"></div>
        <form id="article-form" class="form-grid">
          <label class="full">Project
            <select name="project_id">${projects.map((p) => `<option value="${p.id}">${p.name}</option>`).join("")}</select>
          </label>
          <label class="full">Title<input name="title" placeholder="Repository patterns"></label>
          <label>Status
            <select name="status"><option>Draft</option><option>Review</option><option>Published</option></select>
          </label>
          <label>Reading minutes<input name="reading_minutes" type="number" min="1" value="3"></label>
          <label class="full">Topics<input name="topics" placeholder="postgres, schema, orm"></label>
          <label class="full">Body<textarea name="body"></textarea></label>
          <label class="full">Contributors
            <select name="contributors" multiple size="4">
              ${contributors.map((c) => `<option value="${c.id}">${c.display_name}</option>`).join("")}
            </select>
          </label>
          <button class="primary full" type="submit">Create article</button>
        </form>
      `;
      $("article-form").addEventListener("submit", submitArticle);
    }

    async function loadDashboard() {
      state.dashboard = await api("/api/dashboard");
      renderStats(state.dashboard.stats);
      renderOverview();
    }

    async function loadArticles(page = state.articlePageNumber) {
      state.articlePageNumber = Math.max(page, 0);
      state.articlePage = await api(`/api/articles?page=${state.articlePageNumber}&size=${state.articlePageSize}`);
      renderArticles(state.articlePage);
    }

    async function loadArticle(id) {
      const article = await api(`/api/articles/${id}`);
      state.selectedArticle = article;
      $("side-panel").innerHTML = `
        <h3>${article.title}</h3>
        <div class="message"></div>
        <div><span class="status ${statusText(article.status)}">${statusText(article.status)}</span></div>
        <div class="article-body">${article.body}</div>
        <div class="chips">${article.metadata.topics.map((topic) => `<span class="chip">${topic}</span>`).join("")}</div>
        <h3>Contributors</h3>
        <div class="chips">${article.contributors.map((c) => `<span class="chip">${c.display_name}</span>`).join("")}</div>
      `;
    }

    async function submitProject(event) {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.target));
      try {
        await api("/api/projects", {
          method: "POST",
          body: JSON.stringify({
            slug: data.slug,
            name: data.name,
            description: data.description,
            settings: {
              public_index: data.public_index === "true",
              review_limit: Number(data.review_limit || 2)
            }
          })
        });
        await loadDashboard();
        await loadArticles(0);
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    async function submitContributor(event) {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.target));
      try {
        await api("/api/contributors", { method: "POST", body: JSON.stringify(data) });
        await loadDashboard();
        await loadArticles();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    async function submitArticle(event) {
      event.preventDefault();
      const form = new FormData(event.target);
      const selected = Array.from(event.target.elements.contributors.selectedOptions).map((o) => Number(o.value));
      try {
        await api("/api/articles", {
          method: "POST",
          body: JSON.stringify({
            project_id: Number(form.get("project_id")),
            title: form.get("title"),
            body: form.get("body"),
            status: form.get("status"),
            metadata: {
              reading_minutes: Number(form.get("reading_minutes") || 3),
              topics: String(form.get("topics") || "").split(",").map((x) => x.trim()).filter(Boolean)
            },
            contributor_ids: selected
          })
        });
        await loadDashboard();
        await loadArticles(0);
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-view]").forEach((b) => b.classList.remove("active"));
        button.classList.add("active");
        if (button.dataset.view === "overview") renderOverview();
        if (button.dataset.view === "project") renderProjectForm();
        if (button.dataset.view === "contributor") renderContributorForm();
        if (button.dataset.view === "article") renderArticleForm();
      });
    });

    $("refresh").addEventListener("click", async () => {
      await loadDashboard();
      await loadArticles(state.articlePageNumber);
    });
    $("prev-page").addEventListener("click", () => loadArticles(state.articlePageNumber - 1));
    $("next-page").addEventListener("click", () => loadArticles(state.articlePageNumber + 1));
    $("seed").addEventListener("click", async () => {
      state.dashboard = await api("/api/seed", { method: "POST" });
      renderStats(state.dashboard.stats);
      renderOverview();
      await loadArticles(0);
    });

    Promise.all([loadDashboard(), loadArticles()]).catch(async () => {
      state.dashboard = await api("/api/seed", { method: "POST" });
      renderStats(state.dashboard.stats);
      renderOverview();
      await loadArticles(0);
    });
  </script>
</body>
</html>
