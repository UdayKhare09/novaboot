<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovaBoot STOMP Chat</title>
  <style>
    body { max-width: 46rem; margin: 3rem auto; padding: 0 1rem; font: 16px system-ui, sans-serif; color: #18212f; }
    #messages { height: 20rem; overflow: auto; padding: 1rem; border: 1px solid #cbd5e1; border-radius: .5rem; background: #f8fafc; }
    form { display: flex; gap: .5rem; margin-top: 1rem; } input { flex: 1; padding: .65rem; } button { padding: .65rem 1rem; }
  </style>
</head>
<body>
  <h1>NovaBoot STOMP 1.2 Chat</h1>
  <p><a href="/">Raw WebSocket demo</a></p>
  <p id="status">Connecting…</p>
  <div id="messages" aria-live="polite"></div>
  <form id="chat-form"><input id="message" autocomplete="off" placeholder="Write a message" required><button>Send</button></form>
  <script>
    const status = document.querySelector('#status');
    const messages = document.querySelector('#messages');
    const input = document.querySelector('#message');
    const socket = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/stomp`);
    const frame = (command, headers = {}, body = '') =>
      `${command}\n${Object.entries(headers).map(([k, v]) => `${k}:${v}\n`).join('')}\n${body}\0`;
    const append = text => { const line = document.createElement('p'); line.textContent = text; messages.append(line); messages.scrollTop = messages.scrollHeight; };

    socket.onopen = () => socket.send(frame('CONNECT', {'accept-version': '1.2', 'heart-beat': '0,0'}));
    socket.onmessage = event => {
      const [head, body = ''] = event.data.split('\n\n', 2);
      const [command, ...headers] = head.split('\n');
      if (command === 'CONNECTED') {
        status.textContent = 'Connected';
        socket.send(frame('SUBSCRIBE', {id: 'chat', destination: '/topic/chat'}));
        input.focus();
      } else if (command === 'MESSAGE') {
        append(body.replace(/\0$/, ''));
      } else if (command === 'ERROR') {
        status.textContent = 'STOMP error'; append(event.data);
      }
    };
    socket.onclose = () => { status.textContent = 'Disconnected — refresh to reconnect'; };
    document.querySelector('#chat-form').addEventListener('submit', event => {
      event.preventDefault();
      if (socket.readyState === WebSocket.OPEN) socket.send(frame('SEND', {destination: '/app/chat.send'}, input.value));
      input.value = '';
    });
  </script>
</body>
</html>
