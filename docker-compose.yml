version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: novaboot-postgres
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: novadb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: novaboot-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
